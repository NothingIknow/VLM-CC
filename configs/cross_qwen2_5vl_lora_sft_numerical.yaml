image_max_pixels: 400000
video_max_pixels: 16384
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_target: all

### dataset NUS8_v2 (old), gehler_v2 (old), inter-tau_v1 (old), cube+_v1
dataset: NUS8_numerical_v2, inter-tau_numerical_v1, cube+_numerical_v1
### SamsungNX2000
dataset_dir: data
# media_dir: 
template: qwen2_vl
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 8

### output_direction_16bit_v2, 
output_dir: saves/1111-nus-cube+-inter_numerical_16bit_sRGB_lr_4e_4_512samples_epochs_2_fp32_multi-sensor-projector-vision-tower-numerical/lora/sft
logging_steps: 10
save_steps: 20  # 由于数据集较小，减少保存步数
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### train 32*16 
per_device_train_batch_size: 32
gradient_accumulation_steps: 16
learning_rate: 4.0e-4
num_train_epochs: 2
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: false  # 使用fp32保持16bit图像的完整精度
ddp_timeout: 180000000
resume_from_checkpoint: null
## null
freeze_multi_modal_projector: false
freeze_vision_tower: false

